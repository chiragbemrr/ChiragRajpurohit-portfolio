<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Birthday Letter ❤️</title>

<!-- ============================================================
     ROMANTIC BIRTHDAY LETTER
     ============================================================
     HOW TO CUSTOMIZE:
     1. Search for [WRITE YOUR PERSONAL MESSAGE HERE] and replace
        with your own heartfelt message.
     2. Search for [Your Name] and replace with your name.
     3. To add background music, find the MUSIC SECTION below
        and uncomment the audio tag with your MP3 path.
     ============================================================ -->

<style>
  /* ── Google Fonts ── */
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Great+Vibes&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap');

  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink-light: #fce4ec;
    --pink-mid:   #f48fb1;
    --pink-deep:  #e91e63;
    --red:        #c62828;
    --gold:       #c9a84c;
    --gold-light: #f5e6c0;
    --cream:      #fdf6ee;
    --cream-dark: #f5e8d4;
    --ink:        #4a2c2a;
    --ink-light:  #7b4f46;
    --shadow:     rgba(100, 30, 30, 0.18);
  }

  html, body {
    width: 100%;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #fff0f5 0%, #ffe4ec 40%, #fff5e0 100%);
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    position: relative;
    padding: 40px 16px 60px;
  }

  /* ── Particle Canvas (background) ── */
  #particle-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ════════════════════════════════
     ENVELOPE SCENE
  ════════════════════════════════ */
  #scene {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 20px;
    min-height: calc(100vh - 80px);
    width: 100%;
  }

  #scene-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.3rem, 4vw, 1.9rem);
    color: var(--red);
    text-shadow: 0 2px 8px rgba(200,40,40,0.15);
    letter-spacing: 1px;
    text-align: center;
  }

  /* ── Envelope wrapper ── */
  #envelope-wrap {
    position: relative;
    width: clamp(280px, 80vw, 420px);
    height: clamp(200px, 55vw, 300px);
    cursor: pointer;
    filter: drop-shadow(0 12px 32px var(--shadow));
    transition: transform 0.3s ease;
  }
  #envelope-wrap:hover { transform: translateY(-4px) scale(1.01); }

  /* envelope body */
  .env-body {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #fff5f7 0%, #fce4ec 100%);
    border-radius: 4px 4px 10px 10px;
    border: 1.5px solid #f8bbd0;
    overflow: hidden;
  }

  /* inner V crease lines */
  .env-body::before, .env-body::after {
    content: '';
    position: absolute;
    bottom: 0;
    width: 50%;
    height: 100%;
    border-top: 1.5px solid #f8bbd0;
  }
  .env-body::before { left: 0; transform-origin: bottom left;  transform: skewY(-38deg); }
  .env-body::after  { right: 0; transform-origin: bottom right; transform: skewY(38deg); }

  /* flap */
  .env-flap {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(160deg, #fff0f5 0%, #fce4ec 60%, #f8bbd0 100%);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    border-bottom: 1.5px solid #f8bbd0;
    transform-origin: top center;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 4;
  }
  .env-flap.open {
    transform: rotateX(-180deg);
  }

  /* heart seal */
  #heart-seal {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  #heart-seal svg {
    width: clamp(52px, 14vw, 72px);
    height: clamp(52px, 14vw, 72px);
    filter: drop-shadow(0 0 10px rgba(200,40,40,0.55)) drop-shadow(0 0 22px rgba(200,40,40,0.3));
    animation: heartbeat 1.8s ease-in-out infinite;
  }
  #heart-seal:hover svg { filter: drop-shadow(0 0 18px rgba(200,40,40,0.8)); }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14%       { transform: scale(1.18); }
    28%       { transform: scale(1); }
    42%       { transform: scale(1.1); }
    56%       { transform: scale(1); }
  }

  .click-hint {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    color: var(--pink-deep);
    letter-spacing: 0.5px;
    opacity: 0.85;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }

  /* ── Letter that slides out ── */
  #letter-slide {
    position: absolute;
    left: 8%; right: 8%;
    bottom: 4%;
    height: 90%;
    background: var(--cream);
    border-radius: 6px;
    z-index: 3;
    transform: translateY(0);
    transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s;
    box-shadow: 0 -4px 16px rgba(100,30,30,0.12);
  }
  #letter-slide.rising {
    transform: translateY(-260%);
  }

  /* ════════════════════════════════
     FULL LETTER
  ════════════════════════════════ */
  #letter-page {
    display: none;
    position: relative;
    z-index: 20;
    width: clamp(300px, 90vw, 640px);
    margin: 20px auto 40px;
    background: var(--cream);
    border-radius: 12px;
    padding: clamp(28px, 6vw, 56px) clamp(24px, 6vw, 52px);
    box-shadow:
      0 4px 0 var(--gold),
      0 8px 40px rgba(100,30,30,0.22),
      inset 0 0 60px rgba(200,160,80,0.06);
    border: 1px solid var(--gold-light);
    /* aged-paper texture via repeating lines */
    background-image:
      repeating-linear-gradient(
        transparent, transparent 27px,
        rgba(201,168,76,0.12) 27px, rgba(201,168,76,0.12) 28px
      ),
      linear-gradient(160deg, #fdf6ee 0%, #f9edda 100%);
    animation: fadeInUp 0.7s ease both;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* decorative top ribbon */
  .letter-ribbon {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 70px; height: 4px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    border-radius: 2px;
  }

  .letter-date {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    color: var(--gold);
    text-align: right;
    margin-bottom: 18px;
    letter-spacing: 0.5px;
  }

  .letter-title {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(2rem, 6vw, 3rem);
    color: var(--red);
    text-align: center;
    margin-bottom: 28px;
    line-height: 1.2;
    text-shadow: 0 2px 6px rgba(198,40,40,0.15);
  }

  .letter-divider {
    text-align: center;
    margin: 0 0 24px;
    color: var(--gold);
    font-size: 1.1rem;
    letter-spacing: 8px;
    opacity: 0.7;
  }

  /* typewriter container */
  #typewriter-text {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: clamp(1.15rem, 2.8vw, 1.4rem);
    color: var(--ink);
    line-height: 1.95;
    white-space: pre-wrap;
    min-height: 180px;
  }

  /* blinking cursor */
  #tw-cursor {
    display: inline-block;
    width: 2px; height: 1.1em;
    background: var(--red);
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 0.75s step-end infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .letter-signature {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(1.5rem, 4.5vw, 2.2rem);
    color: var(--red);
    text-align: right;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px dashed var(--gold-light);
    text-shadow: 0 1px 4px rgba(198,40,40,0.12);
  }
.memory-photo {
    margin-top: 25px;
    text-align: center;
}

.memory-photo img {
    width: 170px;
    background: white;
    padding: 10px 10px 30px;
    border-radius: 5px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transform: rotate(-3deg);
}
  /* small floating hearts around letter */
  .letter-hearts {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    border-radius: 12px;
  }
  .lh { position: absolute; font-size: 14px; opacity: 0; animation: letterHeart 4s ease-in-out infinite; }

  @keyframes letterHeart {
    0%   { opacity: 0; transform: translateY(0) scale(0.5); }
    20%  { opacity: 0.7; }
    80%  { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-60px) scale(1.2); }
  }

  /* ── Music toggle button ── */
  #music-btn {
    position: fixed;
    bottom: 22px; right: 22px;
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--pink-deep);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(233,30,99,0.35);
    z-index: 100;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    font-size: 18px;
  }
  #music-btn:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(233,30,99,0.5); }
  #music-btn span { pointer-events: none; }

  /* ── Responsive tweaks ── */
  @media (max-width: 480px) {
    #letter-page { padding: 28px 20px; }
    .letter-title { margin-bottom: 18px; }
  }
</style>
</head>
<body>

<!-- Particle canvas -->
<canvas id="particle-canvas"></canvas>

<!-- ════════ MUSIC SECTION ════════
  To add background music:
  1. Place your MP3 file in the same folder as this HTML file.
  2. Uncomment the <audio> tag below and set src="your-song.mp3".
  3. The play/pause button (bottom-right) will control it.
  ════════════════════════════════ -->

<audio id="bg-music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- ══════ ENVELOPE SCENE ══════ -->
<div id="scene">
  <p id="scene-title">A Special Birthday Letter For You ❤️</p>

  <div id="envelope-wrap" onclick="openEnvelope()">
    <div class="env-body"></div>
    <div class="env-flap" id="env-flap"></div>

    <!-- Letter paper peeking out -->
    <div id="letter-slide"></div>

    <!-- Heart seal -->
    <div id="heart-seal">
      <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="hg" cx="50%" cy="35%">
            <stop offset="0%"   stop-color="#ff6b6b"/>
            <stop offset="100%" stop-color="#c62828"/>
          </radialGradient>
        </defs>
        <!-- heart path -->
        <path d="M50 82 C50 82 8 54 8 28 C8 14 19 5 32 5 C40 5 47 10 50 16 C53 10 60 5 68 5 C81 5 92 14 92 28 C92 54 50 82 50 82Z"
              fill="url(#hg)" stroke="#a31515" stroke-width="1.5"/>
        <!-- shine -->
        <ellipse cx="36" cy="22" rx="8" ry="5" fill="rgba(255,255,255,0.25)" transform="rotate(-30,36,22)"/>
        <!-- gold monogram -->
        <text x="50" y="50" text-anchor="middle" dominant-baseline="middle"
              font-family="Georgia,serif" font-size="22" fill="rgba(255,240,200,0.92)" font-weight="bold">❤</text>
      </svg>
    </div>
  </div>

  <p class="click-hint">✦ Click the heart to open ✦</p>
</div>


<!-- ══════ FULL LETTER PAGE ══════ -->
<div id="letter-page">
  <div class="letter-ribbon"></div>
<div class="memory-photo">
    <img src="photo.jpeg" alt="Our Memory">
</div>  
  <!-- Small floating hearts decoration -->
  <div class="letter-hearts" id="letter-hearts"></div>

  <p class="letter-date" id="letter-date"></p>

  <h1 class="letter-title">Happy Birthday My Love ❤️</h1>

  <div class="letter-divider">✦ ♡ ✦</div>

  <!-- ═══════════════════════════════════════════════════════
       YOUR PERSONAL MESSAGE
       Replace the text inside the backticks below.
       You can use \n for new lines.
       ════════════════════════════════════════════════════ -->
  <div id="typewriter-text"><span id="tw-cursor"></span></div>

  <p class="letter-signature" id="letter-signature">Forever Yours, [Your Name] ❤️</p>

<!-- Music button -->
<button id="music-btn" title="Toggle music" onclick="toggleMusic()">
  <span id="music-icon">🎵</span>
</button>


<script>
  /* ════════════════════════════════════════════
     ✏️  EDIT YOUR MESSAGE HERE
     Use \n for paragraph breaks.
     ════════════════════════════════════════════ */
  const PERSONAL_MESSAGE =
`Happiest birthday to my girl,
Payuu humesha sochta hu tumhare liye kuch to likhunga, par roj tumhe niharne, sun ne me hi tum me itna kho jata huna ki sab bhul jata hu, tumhara itne pyaar se muje baby bulana🫠🫠, love you bolna itne achhe achhe photos aur videos roj mere din ko bhot jayda achha bana dete hai🫂🫂. jabse tum life me aayi ho pichle 5 months se vese to 1year 3months ho gye pr pichle kuch months mere liye bhot precious rahe hai insab me tum ho jisne muje itna achha banaya, muje itna pyaar diya ki me humesha khus hi rahu, payuu aap sirf meri ho sirf meri. 

aap meri sabkuch ho payuuu❤️, mere liye tum 1st time bina family ko bataye ashe mujse mili humne vo 10-15min saath bitaye mere jivan ke sabse achhe pal hai vo meri janu. payuu me aur tum muje ek hi lagte hai jese kahu to chand ke saath tare, flowlers me khusbu, geet ke saath sur aur tumhare sath me sab ek jesa hi hai. me appse bhot jayda bhot bhot jayda pyaar karta hu payuuu, humesha aapke liye sabkuch kr lunga.

Appke sath bitaya huahar pal mere liye ek khubsurat sapne jesa hai jese har pal dekhta hi rahu. payuuu aap mere bure dino me bhi khus rehne ki pyaari si vajah ho❤️.

Meri janu you are my favourite person in the universe, and I am the luckiest soul alive to call you mine.

My love may this birthday bring you all the happiness you so effortlessly give to everyone around you. 🌸`;

  /* Signature — change [Your Name] to your actual name */
  const SIGNATURE = "Forever Yours, Chiku ❤️🫂";

  /* ════════════════════════════════════════════
     PARTICLE SYSTEM — background sparkles & hearts
  ════════════════════════════════════════════ */
  const canvas = document.getElementById('particle-canvas');
  const ctx    = canvas.getContext('2d');
  let particles = [];
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function randomBetween(a, b) { return a + Math.random() * (b - a); }

  function spawnParticle() {
    const type = Math.random() < 0.4 ? 'heart' : 'sparkle';
    return {
      type,
      x: randomBetween(0, W),
      y: H + 20,
      vx: randomBetween(-0.5, 0.5),
      vy: randomBetween(-1.2, -0.3),
      size: type === 'heart' ? randomBetween(10, 22) : randomBetween(3, 7),
      alpha: randomBetween(0.4, 0.9),
      color: ['#e91e63','#f48fb1','#ff80ab','#c62828','#ff4081'][Math.floor(Math.random()*5)],
      spin: randomBetween(-0.03, 0.03),
      angle: 0,
      life: 0,
      maxLife: randomBetween(180, 320)
    };
  }

  // seed initial particles
  for (let i = 0; i < 30; i++) {
    const p = spawnParticle();
    p.y = randomBetween(0, H);
    p.life = randomBetween(0, p.maxLife);
    particles.push(p);
  }

  function drawHeart(cx, cy, size, color, alpha, angle) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.fillStyle = color;
    ctx.beginPath();
    const s = size / 30;
    ctx.moveTo(0, -10 * s);
    ctx.bezierCurveTo( 10*s, -22*s,  28*s, -10*s, 0,  14*s);
    ctx.bezierCurveTo(-28*s, -10*s, -10*s, -22*s, 0, -10*s);
    ctx.fill();
    ctx.restore();
  }

  function drawSparkle(cx, cy, size, color, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(cx, cy, size, 0, Math.PI * 2);
    ctx.fill();
    // cross shine
    ctx.strokeStyle = 'rgba(255,220,240,0.6)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(cx - size*2.5, cy); ctx.lineTo(cx + size*2.5, cy);
    ctx.moveTo(cx, cy - size*2.5); ctx.lineTo(cx, cy + size*2.5);
    ctx.stroke();
    ctx.restore();
  }

  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, W, H);
    frame++;

    // spawn new particle every ~40 frames
    if (frame % 40 === 0 && particles.length < 60) {
      particles.push(spawnParticle());
    }

    particles = particles.filter(p => p.life < p.maxLife);

    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.angle += p.spin;
      p.life++;
      const progress = p.life / p.maxLife;
      const a = p.alpha * (progress < 0.1 ? progress / 0.1 : progress > 0.8 ? (1 - progress) / 0.2 : 1);

      if (p.type === 'heart') {
        drawHeart(p.x, p.y, p.size, p.color, a, p.angle);
      } else {
        drawSparkle(p.x, p.y, p.size, p.color, a);
      }
    }

    requestAnimationFrame(animate);
  }
  animate();

  /* burst hearts upward when envelope opens */
  function burstHearts() {
    for (let i = 0; i < 18; i++) {
      const p = spawnParticle();
      p.type  = 'heart';
      p.x     = W / 2 + randomBetween(-80, 80);
      p.vy    = randomBetween(-2.5, -1);
      p.vx    = randomBetween(-1.5, 1.5);
      p.size  = randomBetween(14, 28);
      p.maxLife = randomBetween(120, 220);
      p.life  = 0;
      particles.push(p);
    }
  }

  /* ════════════════════════════════════════════
     ENVELOPE OPEN ANIMATION
  ════════════════════════════════════════════ */
  let opened = false;
  function openEnvelope() {
    if (opened) return;
    opened = true;

    burstHearts();

    // 1. open flap
    document.getElementById('env-flap').classList.add('open');

    // 2. slide letter up, then show letter page
    setTimeout(() => {
      document.getElementById('letter-slide').classList.add('rising');
    }, 300);

    setTimeout(() => {
      document.getElementById('scene').style.display = 'none';
      const lp = document.getElementById('letter-page');
      lp.style.display = 'block';
      initLetter();
    }, 1200);
  }

  /* ════════════════════════════════════════════
     LETTER INITIALISATION
  ════════════════════════════════════════════ */
  function initLetter() {
    /* date */
    const now = new Date('2026-06-11');
    const opts = { year:'numeric', month:'long', day:'numeric' };
    document.getElementById('letter-date').textContent =
      now.toLocaleDateString('en-GB', opts);

    /* signature */
    document.getElementById('letter-signature').textContent = SIGNATURE;

    /* spawn small hearts around letter */
    const lh = document.getElementById('letter-hearts');
    const positions = [
      {top:'8%',  left:'5%',  delay:'0s'},  {top:'20%', right:'4%', delay:'1.2s'},
      {top:'45%', left:'2%',  delay:'2.1s'},{top:'60%', right:'3%', delay:'0.7s'},
      {top:'80%', left:'7%',  delay:'1.8s'},{top:'90%', right:'6%', delay:'3s'},
      {top:'35%', left:'4%',  delay:'2.6s'},{top:'70%', right:'5%', delay:'1.5s'},
    ];
    positions.forEach(pos => {
      const span = document.createElement('span');
      span.className = 'lh';
      span.textContent = ['❤️','🌸','💕','✨','💖'][Math.floor(Math.random()*5)];
      Object.assign(span.style, pos);
      span.style.animationDelay = pos.delay;
      span.style.animationDuration = (3 + Math.random() * 2) + 's';
      lh.appendChild(span);
    });

    /* typewriter */
    typeWrite(PERSONAL_MESSAGE);
       const audio = document.getElementById('bg-music');
if (audio) {
    audio.play().catch(() => {});
    musicPlaying = true;
    // document.getElementById('music-icon').textContent = '⏸';
}
       opened = true;
  }

  /* ════════════════════════════════════════════
     TYPEWRITER EFFECT
  ════════════════════════════════════════════ */
  function typeWrite(text) {
    const container = document.getElementById('typewriter-text');
    const cursor    = document.getElementById('tw-cursor');
    let i = 0;
    const speed = 28; // ms per character — lower = faster

    function tick() {
      if (i < text.length) {
        // insert before cursor
        cursor.insertAdjacentText('beforebegin', text[i]);
        i++;
        // slight speed variation for natural feel
        const delay = text[i-1] === '\n' ? speed * 6 : speed + randomBetween(-8, 8);
        setTimeout(tick, delay);
      } else {
        // hide cursor when done
        setTimeout(() => { cursor.style.display = 'none'; }, 1500);
      }
    }
    tick();
  }

  /* ════════════════════════════════════════════
     MUSIC TOGGLE
  ════════════════════════════════════════════ */
  let musicPlaying = false;
  function toggleMusic() {
    const audio = document.getElementById('bg-music');
    if (!audio) {
      /* show a friendly hint if no audio element present */
      const btn = document.getElementById('music-btn');
      btn.title = 'Add your MP3 in the MUSIC SECTION of the code';
      document.getElementById('music-icon').textContent = '🔇';
      setTimeout(() => {
        document.getElementById('music-icon').textContent = '🎵';
      }, 2000);
      return;
    }
    if (musicPlaying) {
      audio.pause();
      document.getElementById('music-icon').textContent = '🎵';
      musicPlaying = false;
    } else {
      audio.play();
      document.getElementById('music-icon').textContent = '⏸';
      musicPlaying = true;
    }
  }

     DATE for envelope sub-title (optional use)
  ════════════════════════════════════════════ */

</script>
